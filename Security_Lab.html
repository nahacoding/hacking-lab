<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>보안 체험 게시판</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .post-form { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; }
        input, textarea { width: 95%; margin-bottom: 10px; padding: 8px; }
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .post-list { border-top: 1px solid #eee; margin-top: 20px; }
        .post-item { background: #fff9e6; border: 1px solid #ffeeba; padding: 10px; margin-top: 10px; border-radius: 4px; }
        .admin-box { margin-top: 30px; padding: 10px; background: #ffebee; border: 1px dashed #f44336; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛡️ 미니 보안 체험 게시판</h2>
    
    <div class="post-form">
        <h4>새 글 쓰기</h4>
        <input type="text" id="title" placeholder="제목을 입력하세요">
        <textarea id="content" placeholder="내용을 입력하세요 (XSS 공격 실습 구간)"></textarea>
        <button id="writeBtn" onclick="addPost()" disabled>글쓰기 (권한 없음)</button>
        <p style="font-size: 0.8em; color: red;">* 일반 사용자는 글쓰기 버튼이 막혀 있습니다.</p>
    </div>

    <div class="post-list" id="postList">
        <h4>게시글 목록</h4>
        <div class="post-item">
            <strong id="post-1">환영합니다! 공지사항입니다.</strong>
            <p>작성자: 관리자</p>
        </div>
    </div>

    <div class="admin-box">
        <strong>(미션) 이 미니 사이트를 해킹해라!</strong><br>
        1. [초급] 위 공지사항 제목을 "내가 해킹함"으로 바꿔보세요.<br>
        2. [중급] 비활성화된 '글쓰기' 버튼을 강제로 눌러보세요.<br>
        3. [고급] 내용을 쓸 때 &lt;script&gt; 태그를 사용해 경고창을 띄워보세요.
    </div>
</div>

<script>
    function addPost() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        const list = document.getElementById('postList');

        const newItem = document.createElement('div');
        newItem.className = 'post-item';
        
        // 중요: 취약점을 만들기 위해 innerHTML 사용 (XSS 유도)
        newItem.innerHTML = `<strong>${title}</strong><p>${content}</p>`;
        
        list.appendChild(newItem);
        
        // 입력창 비우기
        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
    }
</script>

</body>
</html>
